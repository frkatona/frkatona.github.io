<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Atmospheric Scattering</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="info">
        <h1>Planetary Atmosphere</h1>
        <p>Left Click: Rotate | Right Click: Pan | Scroll: Zoom (Space to Ground)</p>
    </div>
    <div id="controls">
        <div class="control-group">
            <label>Bloom Strength</label>
            <input type="range" id="bloomStrength" min="0" max="3" step="0.1" value="1.5">
        </div>
        <div class="control-group">
            <label>Film Grain</label>
            <input type="range" id="filmNoise" min="0" max="1" step="0.05" value="0.0">
        </div>
        <div class="control-group">
            <label>RGB Shift</label>
            <input type="range" id="rgbShift" min="0" max="0.01" step="0.0001" value="0.0">
        </div>
        <div class="control-group">
            <label>Vignette</label>
            <input type="range" id="vignetteDarkness" min="0" max="2" step="0.1" value="0.0">
        </div>
    </div>
    <script type="module" src="./js/main.js"></script>
</body>

</html>
