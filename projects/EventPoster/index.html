<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Poster Maker</title>
    <link rel="icon" type="image/x-icon" href="../../assets/images/icons/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/subpage_nav.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="has-subpage-nav">
    <nav class="subpage-nav">
        <a href="../../index.html" class="subpage-nav__link" title="Home">
            <span aria-hidden="true">⌂</span>
            <span>Home</span>
        </a>
    </nav>

    <main class="poster-app">
        <section class="poster-stage" aria-label="Poster preview">
            <div class="poster-frame" id="poster-frame" title="Click for poster actions or drop an image">
                <canvas id="poster-canvas" width="1080" height="1350" aria-label="Generated event poster preview"></canvas>
            </div>
            <input class="image-input" id="image-input" type="file" accept="image/*">
        </section>

        <aside class="control-panel" aria-label="Poster controls">
            <div class="panel-header">
                <p class="eyebrow">Event Poster</p>
            </div>

            <div class="control-group">
                <label for="poster-title">Title</label>
                <textarea id="poster-title" rows="2" maxlength="80">MIDNIGHT SET</textarea>
            </div>

            <div class="control-group">
                <label for="poster-subtitle">Subtitle</label>
                <input id="poster-subtitle" type="text" value="LIVE AT THE RIVER ROOM" maxlength="70">
            </div>

            <div class="control-group">
                <label for="poster-details">Date and Time</label>
                <input id="poster-details" type="text" value="SATURDAY · JUNE 21 · 8 PM" maxlength="80">
            </div>

            <div class="control-group">
                <label for="poster-footer">Location / Tickets</label>
                <input id="poster-footer" type="text" value="123 MARKET ST · TICKETS AT THE DOOR" maxlength="90">
            </div>

            <div class="preset-row" aria-label="Style presets">
                <button class="preset is-active" type="button" data-preset="noir">Noir</button>
                <button class="preset" type="button" data-preset="amber">Amber</button>
                <button class="preset" type="button" data-preset="clean">Clean</button>
            </div>

            <hr class="panel-separator" aria-hidden="true">

            <div class="control-grid image-grid">
                <div class="control-group">
                    <label for="image-scale">Image Scale</label>
                    <input id="image-scale" type="range" min="60" max="220" value="100">
                </div>
                <div class="control-group">
                    <label for="image-x">Image X</label>
                    <input id="image-x" type="range" min="-420" max="420" value="0">
                </div>
                <div class="control-group">
                    <label for="image-y">Image Y</label>
                    <input id="image-y" type="range" min="-520" max="520" value="0">
                </div>
            </div>

            <hr class="panel-separator" aria-hidden="true">

            <div class="control-grid position-grid">
                <div class="control-group">
                    <label for="title-y">Title Y</label>
                    <input id="title-y" type="range" min="90" max="760" value="260">
                </div>
                <div class="control-group">
                    <label for="details-y">Details Y</label>
                    <input id="details-y" type="range" min="700" max="1230" value="1010">
                </div>
            </div>

            <div class="control-grid color-grid">
                <div class="control-group">
                    <label for="text-color">Text</label>
                    <input id="text-color" type="color" value="#f8f4eb">
                </div>
                <div class="control-group">
                    <label for="accent-color">Accent</label>
                    <input id="accent-color" type="color" value="#f4b860">
                </div>
                <div class="control-group color-wheel-control">
                    <label for="open-color-wheel">Extra</label>
                    <button class="color-wheel-button" id="open-color-wheel" type="button">Harmony</button>
                </div>
            </div>

            <hr class="panel-separator" aria-hidden="true">

            <div class="control-group">
                <label for="qr-link">QR Code Link</label>
                <input id="qr-link" type="url" placeholder="https://example.com/tickets">
            </div>

            <div class="control-grid qr-grid">
                <div class="control-group">
                    <label for="qr-size">QR Size</label>
                    <input id="qr-size" type="range" min="110" max="310" value="190">
                </div>
                <div class="control-group">
                    <label for="qr-x">QR X</label>
                    <input id="qr-x" type="range" min="40" max="930" value="815">
                </div>
                <div class="control-group">
                    <label for="qr-y">QR Y</label>
                    <input id="qr-y" type="range" min="40" max="1190" value="1060">
                </div>
            </div>

            <hr class="panel-separator" aria-hidden="true">

            <button class="download-button" id="download-button" type="button">Download Poster</button>
        </aside>
    </main>

    <dialog class="color-dialog" id="color-dialog" aria-labelledby="color-dialog-title">
        <div class="color-dialog__header">
            <div>
                <p class="eyebrow">Color Harmony</p>
                <h2 id="color-dialog-title">Split Complementary</h2>
            </div>
            <button class="dialog-close" id="close-color-wheel" type="button" aria-label="Close color wheel">Close</button>
        </div>

        <div class="wheel-layout">
            <div class="wheel-wrap" aria-hidden="true">
                <div class="hue-wheel" id="hue-wheel">
                    <span class="wheel-marker is-base" data-marker="base"></span>
                    <span class="wheel-marker" data-marker="split-a"></span>
                    <span class="wheel-marker" data-marker="split-b"></span>
                </div>
            </div>

            <div class="wheel-controls">
                <label for="base-hue">Base hue</label>
                <input id="base-hue" type="range" min="0" max="359" value="36">

                <div class="swatch-list" id="split-swatch-list" aria-live="polite"></div>
            </div>
        </div>
    </dialog>

    <dialog class="poster-action-dialog" id="poster-action-dialog" aria-labelledby="poster-action-title">
        <div class="color-dialog__header">
            <div>
                <p class="eyebrow">Poster Preview</p>
                <h2 id="poster-action-title">Choose Action</h2>
            </div>
            <button class="dialog-close" id="close-poster-actions" type="button" aria-label="Close poster actions">Close</button>
        </div>

        <div class="poster-action-list">
            <button class="poster-action-button" id="download-from-preview" type="button">Download Poster</button>
            <button class="poster-action-button" id="upload-base-image" type="button">Upload New Base Image</button>
        </div>
    </dialog>

    <script src="qrcode-generator.js"></script>
    <script src="script.js"></script>
</body>

</html>
