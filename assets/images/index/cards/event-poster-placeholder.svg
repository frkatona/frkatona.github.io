<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Event poster maker placeholder</title>
  <desc id="desc">Stylized poster with image blocks and overlaid event text</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26324a"/>
      <stop offset="0.48" stop-color="#8d3e4b"/>
      <stop offset="1" stop-color="#f0a14b"/>
    </linearGradient>
    <linearGradient id="poster" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1f29"/>
      <stop offset="1" stop-color="#0b0d12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#05060a" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="900" height="620" fill="url(#bg)"/>
